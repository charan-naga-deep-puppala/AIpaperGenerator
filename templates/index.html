<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PaperGen | Multi-Chapter</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4f46e5;
            --bg-page: #f8fafc;
            --sidebar-bg: #ffffff;
            --text-main: #1e293b;
            --border: #e2e8f0;
            --paper-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; }

        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-page); 
            color: var(--text-main); display: flex; flex-direction: column; 
            height: 100vh; overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            background: var(--sidebar-bg); width: 100%; padding: 20px;
            border-bottom: 1px solid var(--border); overflow-y: auto;
            display: flex; flex-direction: column; gap: 15px;
            box-shadow: 4px 0 24px rgba(0,0,0,0.02); z-index: 10;
        }

        .brand-text { font-size: 1.25rem; font-weight: 700; color: #0f172a; margin-bottom: 10px; }

        label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #64748b; margin-bottom: 6px; }

        input[type="text"], select, textarea {
            width: 100%; padding: 10px; border: 1px solid var(--border);
            border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 0.9rem;
        }

        /* New Checkbox List Style */
        .checkbox-container {
            border: 1px solid var(--border);
            border-radius: 6px;
            height: 140px;
            overflow-y: auto;
            padding: 8px;
            background: #fff;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 4px 0;
            font-size: 0.9rem;
        }
        .checkbox-item input {
            width: auto; margin-right: 10px; cursor: pointer;
        }
        .checkbox-item label {
            text-transform: none; font-weight: 400; color: var(--text-main); margin: 0; cursor: pointer;
        }

        .row { display: flex; gap: 10px; }
        .col { flex: 1; }

        .btn-main {
            background: var(--primary); color: white; border: none; padding: 12px;
            border-radius: 6px; font-weight: 600; cursor: pointer; width: 100%;
        }
        .btn-main:hover { background: #4338ca; }
        .btn-main:disabled { background: #cbd5e1; }

        .btn-download {
            background: white; border: 1px solid var(--border); padding: 10px;
            width: 100%; border-radius: 6px; font-weight: 600; cursor: pointer;
            display: none; margin-top: 10px;
        }

        /* --- PREVIEW --- */
        .preview-container {
            flex: 1; background: #f1f5f9; padding: 30px; overflow-y: auto;
            display: flex; justify-content: center;
        }

        .paper {
            background: white; width: 100%; max-width: 210mm; min-height: 297mm;
            padding: 20mm; box-shadow: var(--paper-shadow);
            font-family: 'Merriweather', serif;
        }

        .p-school { font-size: 16px; font-weight: 900; text-align: center; text-transform: uppercase; }
        .p-subtext { font-size: 10px; font-style: italic; text-align: center; }
        .p-location { font-size: 13px; font-weight: 700; text-align: center; margin-bottom: 20px; }
        .p-exam-title { text-align: center; font-weight: 800; margin-bottom: 20px; text-decoration: underline; }

        .meta-table { width: 100%; border-top: 2px solid black; border-bottom: 2px solid black; margin-bottom: 20px; }
        .meta-table td { padding: 8px 0; font-weight: bold; font-size: 12px; }
        .text-right { text-align: right; }

        #p-content { font-size: 12px; line-height: 1.6; white-space: pre-wrap; }
        .section-header { display: block; text-align: center; font-weight: 800; margin: 20px 0 10px 0; }

        @media (min-width: 900px) {
            body { flex-direction: row; }
            .sidebar { width: 400px; height: 100vh; border-right: 1px solid var(--border); border-bottom: none; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-text">🤖 AI PaperGen</div>

        <div>
            <label>Subject</label>
            <select id="subject" onchange="updateBooks()"></select>
        </div>

        <div>
            <label>Book / Part</label>
            <select id="book" onchange="updateChapters()"></select>
        </div>

        <div>
            <label>Select Chapters / Units (Multiple)</label>
            <div id="chapter-container" class="checkbox-container">
                </div>
        </div>

        <div class="row">
            <div class="col">
                <label>Difficulty</label>
                <select id="difficulty">
                    <option>Easy</option>
                    <option selected>Medium</option>
                    <option>Hard</option>
                </select>
            </div>
            <div class="col">
                <label>Test Name</label>
                <input type="text" id="testName" value="Unit Test I">
            </div>
        </div>

        <div class="row">
            <div class="col"><label>Time</label><input type="text" id="time" value="45 mins"></div>
            <div class="col"><label>Marks</label><input type="text" id="marks" value="25"></div>
        </div>

        <div>
            <label>Custom Prompt</label>
            <textarea id="prompt" placeholder="Ex: Add 1 case study..."></textarea>
        </div>

        <button class="btn-main" onclick="generate()">✨ Generate Paper</button>
        <div id="loading" style="display:none; text-align:center; margin-top:10px; color:var(--primary);">Generating...</div>

        <form id="dlForm" action="/download" method="POST" target="_blank">
            <input type="hidden" name="subject" id="d-sub">
            <input type="hidden" name="grade" value="XII">
            <input type="hidden" name="testName" id="d-test">
            <input type="hidden" name="year" value="2025-26">
            <input type="hidden" name="time" id="d-time">
            <input type="hidden" name="marks" id="d-marks">
            <input type="hidden" name="content" id="d-cont">
            <button type="submit" class="btn-download" id="dlBtn">⬇ Download .docx</button>
        </form>
    </div>

    <div class="preview-container">
        <div class="paper">
            <div class="p-school">Bharatiya Vidya Bhavan’s Residential Public School</div>
            <div class="p-subtext">(Sponsored by rice millers’ education and cultural society, W.G.Dt)</div>
            <div class="p-location">VIDHYASHRAM – BHIMAVARAM-534201</div>
            
            <div class="p-exam-title"><span id="p-testName">Unit Test I</span> – 2025-26</div>

            <table class="meta-table">
                <tr>
                    <td>Sub: <span id="p-sub">Subject</span></td>
                    <td class="text-right">Time: <span id="p-time">45 mins</span></td>
                </tr>
                <tr>
                    <td>Class: XII</td>
                    <td class="text-right">Marks: <span id="p-marks">25</span></td>
                </tr>
            </table>

            <div id="p-content" style="color:#999; text-align:center; margin-top:50px;">Select chapters and click Generate.</div>
        </div>
    </div>

    <script>
        const syllabus = {
            "Economics": {
                "Introductory Macroeconomics": ["National Income", "Money and Banking", "Income & Employment", "Govt Budget", "Balance of Payments"],
                "Indian Economic Development": ["Development (1947-90)", "Economic Reforms 1991", "Poverty & Human Capital", "Rural Development", "Infrastructure", "Environment"]
            },
            "Business Studies": {
                "Part I: Principles": ["Nature of Management", "Principles of Mgmt", "Business Environment", "Planning", "Organising", "Staffing", "Directing", "Controlling"],
                "Part II: Finance": ["Financial Management", "Financial Markets", "Marketing Management", "Consumer Protection"]
            },
            "Accountancy": {
                "Part I: Partnership": ["Partnership Basics", "Admission of Partner", "Retirement/Death", "Dissolution"],
                "Part II: Company": ["Share Capital", "Debentures", "Financial Statements", "Ratio Analysis", "Cash Flow"]
            }
        };

        const subSel = document.getElementById("subject");
        const bookSel = document.getElementById("book");
        const chapContainer = document.getElementById("chapter-container");

        // Initialize Subjects
        Object.keys(syllabus).forEach(s => {
            let opt = document.createElement("option");
            opt.value = s; opt.innerText = s;
            subSel.appendChild(opt);
        });

        function updateBooks() {
            bookSel.innerHTML = "";
            let books = syllabus[subSel.value];
            Object.keys(books).forEach(b => {
                let opt = document.createElement("option");
                opt.value = b; opt.innerText = b;
                bookSel.appendChild(opt);
            });
            updateChapters();
        }

        function updateChapters() {
            chapContainer.innerHTML = "";
            let chapters = syllabus[subSel.value][bookSel.value];
            
            chapters.forEach((c, index) => {
                // Create checkbox wrapper
                let div = document.createElement("div");
                div.className = "checkbox-item";
                
                let checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.id = "ch_" + index;
                checkbox.value = c;
                checkbox.name = "chapters";
                
                let label = document.createElement("label");
                label.htmlFor = "ch_" + index;
                label.innerText = c;
                
                div.appendChild(checkbox);
                div.appendChild(label);
                chapContainer.appendChild(div);
            });
        }

        updateBooks(); // Run on load

        async function generate() {
            // Gather selected chapters
            const checkedBoxes = document.querySelectorAll('input[name="chapters"]:checked');
            let selectedChapters = Array.from(checkedBoxes).map(cb => cb.value).join(", ");
            
            if (!selectedChapters) {
                alert("Please select at least one chapter!");
                return;
            }

            const btn = document.querySelector('.btn-main');
            const loading = document.getElementById('loading');
            const pContent = document.getElementById('p-content');
            
            // UI Updates
            document.getElementById('p-sub').innerText = subSel.value;
            document.getElementById('p-testName').innerText = document.getElementById('testName').value;
            document.getElementById('p-time').innerText = document.getElementById('time').value;
            document.getElementById('p-marks').innerText = document.getElementById('marks').value;

            btn.disabled = true;
            loading.style.display = 'block';
            pContent.style.opacity = '0.5';

            const payload = {
                subject: subSel.value,
                book: bookSel.value,
                chapters: selectedChapters, // Sending string of chapters
                difficulty: document.getElementById('difficulty').value,
                grade: "XII",
                testName: document.getElementById('testName').value,
                time: document.getElementById('time').value,
                marks: document.getElementById('marks').value,
                prompt: document.getElementById('prompt').value
            };

            try {
                const res = await fetch('/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if(data.success) {
                    let htmlText = data.content
                        .replace(/</g, "&lt;").replace(/>/g, "&gt;")
                        .replace(/(SECTION [A-Z]|PART [A-Z])/g, '<span class="section-header">$1</span>');
                    
                    pContent.innerHTML = htmlText;
                    
                    document.getElementById('d-sub').value = payload.subject;
                    document.getElementById('d-test').value = payload.testName;
                    document.getElementById('d-time').value = payload.time;
                    document.getElementById('d-marks').value = payload.marks;
                    document.getElementById('d-cont').value = data.content;
                    document.getElementById('dlBtn').style.display = 'block';
                } else {
                    alert(data.error);
                }
            } catch(e) {
                alert("Connection failed");
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
                pContent.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
